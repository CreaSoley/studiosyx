<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#f5f0eb"/>
  <title>Work In Progress — Studio Syx</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .acc-section { border-bottom: 1px solid rgba(0,0,0,0.08); }
    .acc-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 1.2rem 0; cursor: pointer;
      user-select: none; gap: 1rem;
    }
    .acc-title {
      font-size: 1rem; letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 400;
      opacity: 0.5; transition: opacity 0.2s;
    }
    .acc-section.open .acc-title,
    .acc-header:hover .acc-title { opacity: 1; }
    .acc-meta {
      font-size: 0.72rem; opacity: 0.3;
      letter-spacing: 0.06em; flex-shrink: 0; margin-left: auto;
    }
    .acc-chevron {
      width: 16px; height: 16px; flex-shrink: 0;
      opacity: 0.3; transition: transform 0.35s ease, opacity 0.2s;
    }
    .acc-section.open .acc-chevron { transform: rotate(180deg); opacity: 0.6; }
    .acc-header:hover .acc-chevron { opacity: 0.5; }
    .acc-panel {
      display: grid; grid-template-rows: 0fr;
      transition: grid-template-rows 0.38s ease; overflow: hidden;
    }
    .acc-section.open .acc-panel { grid-template-rows: 1fr; }
    .acc-panel-inner { overflow: hidden; min-height: 0; }

    /* ── WIP : liste d'étapes verticale ── */
    .steps-list {
      display: flex; flex-direction: column;
      gap: 1.8rem; padding: 0.5rem 0 2.5rem;
    }
    .step-item {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    .step-item img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
    }
    .step-num {
      font-size: 0.7rem; letter-spacing: 0.1em;
      text-transform: uppercase; opacity: 0.35;
      margin-bottom: 0.4rem;
    }
    .step-item h3 { font-size: 1rem; margin-bottom: 0.3rem; }
    .step-item p  { font-size: 0.82rem; opacity: 0.6; margin: 0.1rem 0; }
    .step-item .step-desc {
      font-size: 0.8rem; opacity: 0.5;
      font-style: italic; margin-top: 0.35rem;
    }
    .empty-page { opacity: 0.4; font-size: 0.85rem; font-style: italic; padding: 1.5rem 0; }

    @media (max-width: 600px) {
      .step-item { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index.html"><img src="images/logo.png" alt="Logo Studio Syx" class="logo"/></a>
    </nav>
  </header>

  <main>
    <h1>Work In Progress</h1>
    <p class="intro">Bienvenue dans ma galerie de travaux en cours. Ici vous pourrez découvrir certains de mes travaux étapes par étapes.</p>
    <p><a href="index.html">← Retour à l'accueil</a></p>
    <div id="gallery-container"></div>
  </main>

  <footer>
    <p>&copy; 2025 Studio Syx — Alyxia Collet</p>
  </footer>

  <script>
  (function() {
    const DATA_KEY = 'studiosyx_data';
    const ACC_KEY  = 'studiosyx_acc_wip';   // ← clé unique à cette page

    const DEFAULT = [
      { section:'Fresque dragon en pyrogravure', oeuvres:[
        { id:'wip001', title:'Esquisse du dragon sur le support', img:'images/wip/wip01d.jpeg', date:'2025', technique:'', intention:'Esquisse au crayon sur le support bois avant de commencer la gravure.', visible:true },
        { id:'wip002', title:'Début de la pyrogravure',           img:'images/wip/wip1d.jpeg',  date:'2025', technique:'', intention:'Premières passes à la pointe chaude sur les contours principaux.', visible:true },
        { id:'wip003', title:'Pyrogravure d\'une des pattes avant', img:'images/wip/wip2d.jpeg', date:'2025', technique:'', intention:'Travail du détail sur la patte avant gauche, jeu d\'ombres et de reliefs.', visible:true },
        { id:'wip004', title:'Pyrogravure de la tête',            img:'images/wip/wip03d.jpeg', date:'2025', technique:'', intention:'Gravure du museau, des écailles et de l\'œil.', visible:true },
        { id:'wip005', title:'Pyrogravure de la crête',           img:'images/wip/wip3d.jpeg',  date:'2025', technique:'', intention:'Finition de la crête dorsale et des épines.', visible:true },
      ]},
      { section:'Projet 2', oeuvres:[
        { id:'wip006', title:'Titre du projet', img:'images/wip2.jpg', date:'', technique:'', intention:'', visible:true },
      ]},
    ];

    function getData() {
      try {
        const s = localStorage.getItem(DATA_KEY);
        if (s) return JSON.parse(s).wip || DEFAULT;
      } catch(e) {}
      return DEFAULT;
    }

    function loadState(visibleSections) {
      try {
        const s = localStorage.getItem(ACC_KEY);
        if (s) return JSON.parse(s);
      } catch(e) {}
      const state = {};
      visibleSections.forEach((sec, i) => { state[sec.section] = (i === 0); });
      return state;
    }

    function saveState(state) {
      try { localStorage.setItem(ACC_KEY, JSON.stringify(state)); } catch(e) {}
    }

    function buildChevron() {
      return `<svg class="acc-chevron" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                   stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"/>
              </svg>`;
    }

    function render() {
      const container = document.getElementById('gallery-container');
      const sections  = getData().filter(sec => sec.oeuvres.some(o => o.visible));

      if (!sections.length) {
        container.innerHTML = '<p class="empty-page">Aucun projet en cours pour le moment.</p>';
        return;
      }

      const state = loadState(sections);
      container.innerHTML = '';

      sections.forEach(sec => {
        const visible = sec.oeuvres.filter(o => o.visible);
        const isOpen  = !!state[sec.section];

        const secEl = document.createElement('div');
        secEl.className = 'acc-section' + (isOpen ? ' open' : '');

        const header = document.createElement('div');
        header.className = 'acc-header';
        header.setAttribute('role', 'button');
        header.setAttribute('aria-expanded', String(isOpen));
        header.innerHTML = `
          <span class="acc-title">${sec.section}</span>
          <span class="acc-meta">${visible.length}&nbsp;étape${visible.length > 1 ? 's' : ''}</span>
          ${buildChevron()}
        `;

        const panel = document.createElement('div');
        panel.className = 'acc-panel';
        const inner = document.createElement('div');
        inner.className = 'acc-panel-inner';
        const list = document.createElement('div');
        list.className = 'steps-list';

        visible.forEach((o, idx) => {
          const step = document.createElement('div');
          step.className = 'step-item';
          step.innerHTML = `
            ${o.img ? `<img src="${o.img}" alt="${o.title}" loading="lazy">` : '<div style="aspect-ratio:4/3;background:var(--accent-light,#e8d5ca);opacity:.4"></div>'}
            <div>
              <div class="step-num">Étape ${idx + 1}</div>
              <h3>${o.title}</h3>
              ${o.date      ? `<p><strong>Date :</strong> ${o.date}</p>` : ''}
              ${o.technique ? `<p><strong>Technique :</strong> ${o.technique}</p>` : ''}
              ${o.intention ? `<p class="step-desc">${o.intention}</p>` : ''}
            </div>
          `;
          list.appendChild(step);
        });

        inner.appendChild(list);
        panel.appendChild(inner);
        secEl.appendChild(header);
        secEl.appendChild(panel);
        container.appendChild(secEl);

        header.addEventListener('click', () => {
          const opening = !secEl.classList.contains('open');
          secEl.classList.toggle('open', opening);
          header.setAttribute('aria-expanded', String(opening));
          const s = loadState(sections);
          s[sec.section] = opening;
          saveState(s);
        });
      });
    }

    render();
    window.addEventListener('storage', e => { if (e.key === DATA_KEY) render(); });
  })();
  </script>
</body>
</html>
